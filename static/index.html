<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BGM動画ファクトリー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #14141f; color: #e8e8f0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; background: #1d1d2e; border-bottom: 1px solid #33334d; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: #8a8aa8; font-size: 12px; }
  .yt-badge { margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #2c2c44; }
  .yt-badge.ok { background: #1a3a1a; color: #5dba6f; }
  .yt-badge.no { background: #3a1a1a; color: #e05d5d; cursor: pointer; }
  .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 10px; min-height: 0; }
  .pane { background: #1d1d2e; border: 1px solid #33334d; border-radius: 10px; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .pane h2 { font-size: 14px; color: #9d9dff; }
  .drop { border: 2px dashed #44446a; border-radius: 8px; padding: 24px; text-align: center; color: #8a8aa8; cursor: pointer; font-size: 13px; }
  .drop.ok { border-color: #5dba6f; color: #5dba6f; }
  .drop.multi { min-height: 60px; }
  label { font-size: 12px; color: #8a8aa8; }
  input[type=text], input[type=number], input[type=datetime-local], select, textarea { width: 100%; background: #14141f; border: 1px solid #33334d; border-radius: 6px; color: #e8e8f0; padding: 8px; font-size: 13px; }
  textarea { min-height: 90px; resize: vertical; }
  button { background: #5b5bd6; color: #fff; border: 0; border-radius: 6px; padding: 10px 14px; font-size: 13px; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
  button.big { font-size: 15px; padding: 12px; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  img.preview { max-width: 100%; max-height: 140px; border-radius: 8px; object-fit: cover; align-self: center; }
  .job { background: #14141f; border: 1px solid #33334d; border-radius: 8px; padding: 10px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .job .st { font-size: 12px; color: #8a8aa8; }
  .job.done .st { color: #5dba6f; }
  .job.error .st { color: #e05d5d; }
  .job a { color: #9d9dff; font-size: 12px; white-space: nowrap; }
  small.note { color: #c9a86a; }
  .copy { background: #2c2c44; }
  .audio-list { font-size: 12px; color: #5dba6f; }
  .section-label { font-size: 11px; color: #6666aa; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>🎵 BGM動画ファクトリー</h1>
  <span>曲とジャケットを入れたら、YouTube投稿パッケージが出てくる</span>
  <div class="yt-badge no" id="ytBadge" onclick="ytAuth()">YouTube: 未連携</div>
</header>
<div class="grid">

  <!-- ① 音源 -->
  <div class="pane">
    <h2>① 音源 (複数曲でメドレーも可)</h2>
    <div class="drop multi" id="audioDrop" onclick="pick('audio')">
      🎧 MP3 / WAV をドロップ or クリック（複数可）
    </div>
    <input type="file" id="audioFile" accept="audio/*" multiple hidden>
    <div class="audio-list" id="audioList"></div>
    <label>動画の長さ</label>
    <select id="minutes">
      <option value="30">30分</option>
      <option value="60" selected>1時間</option>
      <option value="120">2時間</option>
      <option value="180">3時間</option>
    </select>
    <small>クロスフェードで自然にループ伸長＋音量正規化。複数曲は連結してループ。</small>
  </div>

  <!-- ② ビジュアル -->
  <div class="pane">
    <h2>② ビジュアル (ジャケット画像)</h2>
    <div class="drop" id="imageDrop" onclick="pick('image')">🖼 PNG / JPG をドロップ or クリック</div>
    <input type="file" id="imageFile" accept="image/*" hidden>
    <img class="preview" id="preview" hidden>
    <label>エフェクト</label>
    <select id="effect">
      <option value="zoom" selected>ゆっくりズーム</option>
      <option value="static">静止画</option>
    </select>
    <div class="section-label">サムネイル文字入れ</div>
    <textarea id="thumbLines" style="min-height:56px" placeholder="1行目: 例) 3 Hours&#10;2行目: 例) Sleep Music（空欄でスキップ）"></textarea>
    <button class="copy" onclick="previewThumb()" id="thumbBtn" disabled>👁 プレビュー生成</button>
  </div>

  <!-- ③ メタデータ -->
  <div class="pane">
    <h2>③ メタデータ (タイトル・説明・タグ)</h2>
    <div class="row">
      <input type="text" id="theme" placeholder="テーマ (例: 雨音とピアノ)">
      <input type="text" id="genre" placeholder="ジャンル (例: 睡眠用オルゴール)">
    </div>
    <button onclick="genMeta()" id="metaBtn">🤖 AIで生成</button>
    <small class="note" id="metaNote"></small>
    <label>タイトル (日)</label><input type="text" id="titleJa">
    <label>タイトル (英)</label><input type="text" id="titleEn">
    <label>説明文</label><textarea id="desc"></textarea>
    <label>タグ</label><textarea id="tags" style="min-height:50px"></textarea>
    <button class="copy" onclick="copyAll()">📋 全部コピー</button>
  </div>

  <!-- ④ キュー -->
  <div class="pane">
    <h2>④ レンダリングキュー</h2>
    <div id="ytAuthSection" style="display:none">
      <div class="section-label">YouTube 予約投稿</div>
      <input type="datetime-local" id="publishAt" title="空欄=アップロードしない">
      <small>日時を入力するとレンダリング後に自動アップロード＋予約投稿</small>
    </div>
    <button class="big" onclick="createJob()" id="renderBtn" disabled>▶ 動画を生成する</button>
    <div id="jobs"></div>
  </div>

</div>
<script>
let uploaded = { audio: [], image: null };

function pick(kind) { document.getElementById(kind + 'File').click(); }

// audio: multiple
const audioInput = document.getElementById('audioFile');
const audioDrop = document.getElementById('audioDrop');
audioInput.onchange = () => { for (const f of audioInput.files) uploadAudio(f); };
audioDrop.ondragover = e => e.preventDefault();
audioDrop.ondrop = e => { e.preventDefault(); for (const f of e.dataTransfer.files) uploadAudio(f); };

// image: single
const imageInput = document.getElementById('imageFile');
const imageDrop = document.getElementById('imageDrop');
imageInput.onchange = () => imageInput.files[0] && uploadImage(imageInput.files[0]);
imageDrop.ondragover = e => e.preventDefault();
imageDrop.ondrop = e => { e.preventDefault(); e.dataTransfer.files[0] && uploadImage(e.dataTransfer.files[0]); };

async function uploadAudio(file) {
  const fd = new FormData();
  fd.append('file', file); fd.append('kind', 'audio');
  const j = await (await fetch('/api/upload', { method: 'POST', body: fd })).json();
  uploaded.audio.push(j.filename);
  renderAudioList();
  checkReady();
}

function renderAudioList() {
  const list = document.getElementById('audioList');
  if (!uploaded.audio.length) { list.textContent = ''; return; }
  list.innerHTML = uploaded.audio.map((f, i) =>
    `<div>✅ ${f} <span style="cursor:pointer;color:#e05d5d" onclick="removeAudio(${i})">✕</span></div>`
  ).join('');
  audioDrop.classList.add('ok');
}

function removeAudio(i) {
  uploaded.audio.splice(i, 1);
  if (!uploaded.audio.length) audioDrop.classList.remove('ok');
  renderAudioList();
  checkReady();
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('file', file); fd.append('kind', 'image');
  const j = await (await fetch('/api/upload', { method: 'POST', body: fd })).json();
  uploaded.image = j.filename;
  imageDrop.textContent = '✅ ' + j.original;
  imageDrop.classList.add('ok');
  const img = document.getElementById('preview');
  img.src = URL.createObjectURL(file); img.hidden = false;
  document.getElementById('thumbBtn').disabled = false;
  checkReady();
}

function checkReady() {
  document.getElementById('renderBtn').disabled = !(uploaded.audio.length && uploaded.image);
}

async function previewThumb() {
  const lines = document.getElementById('thumbLines').value.trim();
  if (!lines) return;
  const fd = new FormData();
  fd.append('image', uploaded.image);
  fd.append('lines', lines);
  const j = await (await fetch('/api/thumbnail', { method: 'POST', body: fd })).json();
  const img = document.getElementById('preview');
  img.src = `/api/thumb_preview/${j.filename}?t=${Date.now()}`;
}

async function genMeta() {
  const btn = document.getElementById('metaBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  const fd = new FormData();
  fd.append('theme', document.getElementById('theme').value || 'リラックスBGM');
  fd.append('genre', document.getElementById('genre').value || '睡眠用音楽');
  fd.append('minutes', document.getElementById('minutes').value);
  try {
    const j = await (await fetch('/api/metadata', { method: 'POST', body: fd })).json();
    document.getElementById('titleJa').value = j.title_ja;
    document.getElementById('titleEn').value = j.title_en;
    document.getElementById('desc').value = j.description;
    document.getElementById('tags').value = (j.tags || []).join(', ');
    document.getElementById('metaNote').textContent = j.note || '';
  } finally { btn.disabled = false; btn.textContent = '🤖 AIで生成'; }
}

function copyAll() {
  navigator.clipboard.writeText(
    document.getElementById('titleJa').value + '\n' +
    document.getElementById('titleEn').value + '\n\n' +
    document.getElementById('desc').value + '\n\nタグ:\n' +
    document.getElementById('tags').value
  );
}

async function createJob() {
  const fd = new FormData();
  fd.append('audio', uploaded.audio.join(','));
  fd.append('image', uploaded.image);
  fd.append('minutes', document.getElementById('minutes').value);
  fd.append('effect', document.getElementById('effect').value);
  fd.append('title', document.getElementById('titleJa').value);
  fd.append('thumb_lines', document.getElementById('thumbLines').value);
  const pa = document.getElementById('publishAt');
  if (pa && pa.value) fd.append('publish_at', new Date(pa.value).toISOString());
  await fetch('/api/jobs', { method: 'POST', body: fd });
  loadJobs();
}

async function loadJobs() {
  const jobs = await (await fetch('/api/jobs')).json();
  document.getElementById('jobs').innerHTML = jobs.map(j => {
    const ytLink = j.youtube_id
      ? `<a href="https://youtu.be/${j.youtube_id}" target="_blank">▶ YT</a>` : '';
    const dlLink = j.output ? `<a href="/api/download/${j.output}" download>⬇ DL</a>` : '';
    return `<div class="job ${j.status}">
      <div><div>${j.title}</div><div class="st">${j.progress}${j.error ? ' — ' + j.error.slice(0, 120) : ''}</div></div>
      <div style="display:flex;gap:8px">${dlLink}${ytLink}</div>
    </div>`;
  }).join('');
}

// YouTube status
async function checkYtStatus() {
  const s = await (await fetch('/api/youtube/status')).json();
  const badge = document.getElementById('ytBadge');
  const section = document.getElementById('ytAuthSection');
  if (s.authenticated) {
    badge.textContent = 'YouTube: 連携済み ✓';
    badge.className = 'yt-badge ok';
    section.style.display = '';
  } else if (s.has_secrets) {
    badge.textContent = 'YouTube: 要認証';
    badge.className = 'yt-badge no';
    section.style.display = 'none';
  } else {
    badge.textContent = 'YouTube: 未設定';
    badge.className = 'yt-badge no';
    section.style.display = 'none';
  }
}

async function ytAuth() {
  const r = await fetch('/api/youtube/auth');
  if (!r.ok) { alert('data/client_secrets.json を配置してください'); return; }
  const j = await r.json();
  window.open(j.url, '_blank', 'width=600,height=700');
  setTimeout(checkYtStatus, 5000);
}

// サムネプレビュー用エンドポイントは uploads から直接配信
setInterval(loadJobs, 3000);
setInterval(checkYtStatus, 10000);
loadJobs();
checkYtStatus();

// yt_auth=ok で戻ってきたら再チェック
if (location.search.includes('yt_auth=ok')) {
  history.replaceState({}, '', '/');
  checkYtStatus();
}
</script>
</body>
</html>
