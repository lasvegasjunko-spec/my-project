<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-body">
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <img src="icons/icon32.png" alt="Claude" width="20" height="20" />
        <span>Claude AI</span>
      </div>
      <a href="#" id="options-link" title="設定">⚙</a>
    </header>

    <div id="api-key-warning" class="warning hidden">
      <p>APIキーが設定されていません。</p>
      <button id="go-to-options" class="btn btn-primary btn-sm">設定する</button>
    </div>

    <div id="selected-text-section" class="section">
      <div class="section-label">選択中のテキスト</div>
      <div id="selected-text-preview" class="text-preview">（なし）</div>
      <div class="action-buttons">
        <button class="btn btn-action" data-action="summarize">要約</button>
        <button class="btn btn-action" data-action="ask">説明</button>
        <button class="btn btn-action" data-action="translate">翻訳</button>
      </div>
    </div>

    <div id="result-section" class="section hidden">
      <div class="section-label">
        結果
        <button id="clear-result" class="btn-link">✕ クリア</button>
      </div>
      <div id="result-text" class="result-text"></div>
    </div>

    <div class="section">
      <div class="section-label">チャット</div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Claudeに質問する..."
          rows="2"
        ></textarea>
        <button id="send-btn" class="btn btn-primary">送信</button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
